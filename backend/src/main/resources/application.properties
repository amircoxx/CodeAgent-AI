server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/codeguard}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:codeguard}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:codeguard}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

codeguard.ai.enabled=${CODEGUARD_AI_ENABLED:false}
codeguard.ai.api-key=${CODEGUARD_AI_API_KEY:}
codeguard.ai.model=${CODEGUARD_AI_MODEL:gpt-4o-mini}
codeguard.ai.endpoint=${CODEGUARD_AI_ENDPOINT:https://api.openai.com/v1/chat/completions}
codeguard.ai.timeout-seconds=${CODEGUARD_AI_TIMEOUT_SECONDS:20}

codeguard.github.token=${CODEGUARD_GITHUB_TOKEN:}
codeguard.github.api-base-url=${CODEGUARD_GITHUB_API_BASE_URL:https://api.github.com}
codeguard.github.app-id=${CODEGUARD_GITHUB_APP_ID:0}
codeguard.github.app-slug=${CODEGUARD_GITHUB_APP_SLUG:}
codeguard.github.private-key=${CODEGUARD_GITHUB_PRIVATE_KEY:}
codeguard.github.setup-callback-url=${CODEGUARD_GITHUB_SETUP_CALLBACK_URL:}
codeguard.github.frontend-connected-redirect-url=${CODEGUARD_GITHUB_FRONTEND_CONNECTED_REDIRECT_URL:http://localhost:3000/?github=connected}
codeguard.github.pending-state-ttl-minutes=${CODEGUARD_GITHUB_PENDING_STATE_TTL_MINUTES:10}
codeguard.github.timeout-seconds=${CODEGUARD_GITHUB_TIMEOUT_SECONDS:15}
codeguard.github.max-files=${CODEGUARD_GITHUB_MAX_FILES:20}
codeguard.github.max-patch-chars=${CODEGUARD_GITHUB_MAX_PATCH_CHARS:30000}
codeguard.github.comments-enabled=${CODEGUARD_GITHUB_COMMENTS_ENABLED:false}

codeguard.jwt.secret=${CODEGUARD_JWT_SECRET:dev-secret-change-me}
codeguard.jwt.expiration-ms=${CODEGUARD_JWT_EXPIRATION_MS:86400000}

codeguard.account.password-code-ttl-minutes=${CODEGUARD_PASSWORD_CODE_TTL_MINUTES:15}
codeguard.account.expose-dev-verification-code=${CODEGUARD_EXPOSE_DEV_VERIFICATION_CODE:false}

codeguard.cors.allowed-origins=${CODEGUARD_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002}
